<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CactiGuard Login</title>

    <style>
        body {
            margin: 0;
            font-family: Poppins, sans-serif;
            background: linear-gradient(135deg, #fdf7e8, #efe6d1);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* container */

        .container {
            width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* LEFT */

        .left {
            width: 50%;
        }

        .logo {
            font-weight: bold;
            color: #3a7d44;
            margin-bottom: 60px;
            font-size: 22px;
        }

        /* PILLARS */

        .pillars {
            display: flex;
            gap: 70px;
            perspective: 1000px;
        }

        /* pillar body */

        .pillar {
            width: 75px;
            height: 260px;

            background: linear-gradient(to right,
                    #d8caa8 0%,
                    #f6eed7 25%,
                    #ffffff 50%,
                    #f6eed7 75%,
                    #d8caa8 100%);

            border-radius: 50px;

            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;

            box-shadow:
                inset -8px 0 12px rgba(0, 0, 0, 0.15),
                inset 8px 0 12px rgba(255, 255, 255, 0.8),
                0 25px 30px rgba(0, 0, 0, 0.2);
        }

        /* floating animation */

        .pillar:nth-child(1) {
            animation: float 4s ease-in-out infinite;
        }

        .pillar:nth-child(2) {
            animation: float 5s ease-in-out infinite;
        }

        .pillar:nth-child(3) {
            animation: float 4.5s ease-in-out infinite;
        }

        .pillar:nth-child(4) {
            animation: float 5.5s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-12px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* pillar top */

        .hat {
            width: 110px;
            height: 22px;

            background: linear-gradient(to bottom,
                    #e6d8b7,
                    #cbb690);

            border-radius: 12px;
            margin-top: -14px;

            box-shadow:
                0 5px 10px rgba(0, 0, 0, 0.2),
                inset 0 3px 6px rgba(255, 255, 255, 0.6);
        }

        /* pillar base */

        .pillar::after {
            content: "";
            position: absolute;
            bottom: -18px;

            width: 110px;
            height: 20px;

            background: linear-gradient(#e6d8b7, #cbb690);

            border-radius: 10px;

            box-shadow:
                0 6px 12px rgba(0, 0, 0, 0.25);
        }

        /* eyes */

        .eyes {
            display: flex;
            gap: 10px;
            margin-top: 90px;
        }

        .eye {
            width: 20px;
            height: 20px;

            background: white;
            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            box-shadow:
                inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .pupil {
            width: 8px;
            height: 8px;
            background: black;
            border-radius: 50%;
            transition: transform .1s linear;
        }

        /* closed eye */

        .closed-eye {
            background: black;
            height: 3px;
            border-radius: 3px;
        }

        /* LOGIN CARD */

        .card {
            width: 360px;
            background: white;
            padding: 40px;
            border-radius: 20px;

            box-shadow:
                0 10px 20px rgba(0, 0, 0, 0.08),
                0 30px 60px rgba(0, 0, 0, 0.12);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .card p {
            text-align: center;
            font-size: 14px;
            color: #777;
            margin-bottom: 20px;
        }

        .card input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .password {
            position: relative;
        }

        .toggle {
            position: absolute;
            right: 10px;
            top: 14px;
            cursor: pointer;
            font-size: 18px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #a6845d;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #8f6e4c;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="left">


            <div class="pillars">

                <div class="pillar">
                    <div class="hat"></div>
                    <div class="eyes">
                        <div class="eye">
                            <div class="pupil"></div>
                        </div>
                        <div class="eye">
                            <div class="pupil"></div>
                        </div>
                    </div>
                </div>

                <div class="pillar">
                    <div class="hat"></div>
                    <div class="eyes">
                        <div class="eye">
                            <div class="pupil"></div>
                        </div>
                        <div class="eye">
                            <div class="pupil"></div>
                        </div>
                    </div>
                </div>

                <div class="pillar">
                    <div class="hat"></div>
                    <div class="eyes">
                        <div class="eye">
                            <div class="pupil"></div>
                        </div>
                        <div class="eye">
                            <div class="pupil"></div>
                        </div>
                    </div>
                </div>

                <div class="pillar">
                    <div class="hat"></div>
                    <div class="eyes">
                        <div class="eye">
                            <div class="pupil"></div>
                        </div>
                        <div class="eye">
                            <div class="pupil"></div>
                        </div>
                    </div>
                </div>

            </div>

        </div>

        <div class="card">

            <form id="loginForm">

                <h2>Welcome Back</h2>
                <p>Sign in to your account</p>

                <input type="email" name="email" placeholder="your@email.com" required>

                <div class="password">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <span class="toggle" id="toggle">👁</span>
                </div>

                <button type="submit">Sign In</button>

            </form>

        </div>

    </div>

    <script>

        /* eye tracking */

        const pupils = document.querySelectorAll(".pupil");

        document.addEventListener("mousemove", (e) => {

            pupils.forEach(pupil => {

                const rect = pupil.parentElement.getBoundingClientRect();

                const x = rect.left + rect.width / 2;
                const y = rect.top + rect.height / 2;

                const dx = e.clientX - x;
                const dy = e.clientY - y;

                const angle = Math.atan2(dy, dx);

                const moveX = Math.cos(angle) * 4;
                const moveY = Math.sin(angle) * 4;

                pupil.style.transform = `translate(${moveX}px,${moveY}px)`;

            });

        });

        /* password toggle */

        const toggle = document.getElementById("toggle");
        const password = document.getElementById("password");
        const eyes = document.querySelectorAll(".eye");

        toggle.onclick = () => {

            if (password.type === "password") {

                password.type = "text";

                pupils.forEach(p => p.style.display = "none");
                eyes.forEach(e => e.classList.add("closed-eye"));

            }
            else {

                password.type = "password";

                pupils.forEach(p => p.style.display = "block");
                eyes.forEach(e => e.classList.remove("closed-eye"));

            }

        };


        /* LOGIN FUNCTION */

        document.getElementById("loginForm").addEventListener("submit", async (e) => {

            e.preventDefault();

            const formData = new FormData(e.target);

            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData)
            });

            if (res.ok) {

                const { accessToken } = await res.json();

                localStorage.setItem("accessToken", accessToken);
                localStorage.setItem("authToken", accessToken); // old key support

                alert("Logged in successfully!");

                window.location.href = "dashboard.html";

            }
            else {

                const error = await res.json();

                alert(error.message);

            }

        });

    </script>

</body>

</html>
